<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <title>Paper Linter</title>
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="topbar">
        <div class="brand">
          <img class="brand-logo" src="./assets/logo.svg" alt="Paper Linter" />
        </div>
        <div class="header-actions">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">Light mode</button>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <aside class="control-panel">
        <form id="lint-form">
          <fieldset class="panel-section input-section">
            <legend>Source</legend>
            <input id="archive-input" class="visually-hidden" type="file" accept=".zip,.tar,.gz,.tgz,.tar.gz,application/zip,application/gzip" />
            <input id="directory-input" class="visually-hidden" type="file" webkitdirectory multiple />
            <div id="drop-zone" class="drop-zone">
              <div class="drop-center">
                <strong>Upload source</strong>
                <span id="drop-name">Drop here</span>
              </div>
              <div class="source-actions" aria-label="Choose source">
                <button id="choose-archive" class="source-choice" type="button">
                  <strong>Archive</strong>
                </button>
                <button id="choose-directory" class="source-choice" type="button">
                  <strong>Folder</strong>
                </button>
              </div>
            </div>

            <label>Preset
              <select id="preset-select" name="preset">
                <option value="custom">custom</option>
                <option value="essential">essential</option>
                <option value="standard" selected>standard</option>
                <option value="strict">strict</option>
                <option value="polish">polish</option>
              </select>
            </label>

            <div class="tex-mode" aria-label="TeX file selection mode">
              <span class="tex-mode-label active" tabindex="0" data-mode-label="filtered" data-tooltip="Analyze only TeX files that are likely to belong to the main paper source.">filter .tex</span>
              <label class="switch" aria-label="Toggle TeX file selection mode">
                <input id="all-tex-toggle" type="checkbox" name="all_tex" value="true" />
                <span class="switch-track"></span>
                <span class="switch-thumb"></span>
              </label>
              <span class="tex-mode-label" tabindex="0" data-mode-label="all" data-tooltip="Analyze every .tex file in the archive, including samples, alternatives, and auxiliary source files.">all .tex</span>
            </div>
          </fieldset>

          <span id="status" class="status visually-hidden" aria-live="polite"></span>

          <fieldset class="panel-section">
            <legend>Rule Groups</legend>
            <div id="rule-groups" class="group-grid"></div>
          </fieldset>

          <fieldset class="panel-section">
            <legend>Rules</legend>
            <div class="rule-toolbar">
              <input id="rule-filter" type="text" placeholder="Filter by code or name" />
            </div>
            <div id="rules" class="rules"></div>
            <input type="hidden" name="select" id="select-value" />
          </fieldset>
        </form>
      </aside>

      <section class="report">
        <div class="report-head">
          <div class="report-heading">
            <div class="report-title-row">
              <div class="report-title">Report</div>
              <button id="copy-report" class="icon-button" type="button" aria-label="Copy report as Markdown" title="Copy report as Markdown" disabled>
                <span class="icon-button-icon icon-copy" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </span>
                <span class="icon-button-icon icon-check" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path class="check-path" d="M5 13l4 4L19 7"></path>
                  </svg>
                </span>
              </button>
            </div>
            <div id="source" class="subtitle"></div>
          </div>
          <div class="metrics">
            <span class="metric" id="files">files 0</span>
            <span class="metric error" id="errors">errors 0</span>
            <span class="metric warning" id="warnings">warnings 0</span>
          </div>
        </div>
        <div id="report" class="markdown-report empty">Upload a local archive or directory to run the linter.</div>
      </section>
    </main>
  </body>
</html>
