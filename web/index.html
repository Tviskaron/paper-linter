<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg?v=2" />
    <script>
      (() => {
        try {
          if (localStorage.getItem("paper-linter-theme") === "dark") {
            document.documentElement.dataset.theme = "dark";
          }
        } catch {
          /* Keep the default light theme if storage is unavailable. */
        }
      })();
    </script>
    <link rel="stylesheet" href="./src/styles.css" />
    <title>Paper Linter</title>
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="topbar">
        <a class="brand" href="./" aria-label="Paper Linter">
          <svg class="brand-icon" viewBox="0 0 64 64" aria-hidden="true">
            <path class="brand-line" d="M39 35h5M35 44h9" />
            <path class="brand-paper" d="M25 54h19a7 7 0 0 0 7-7V21L39 9H26a7 7 0 0 0-7 7v10" />
            <path class="brand-paper" d="M39 10v9a4 4 0 0 0 4 4h8" />
            <path class="brand-bolt" d="M27 21 14 38h10l-5 17 19-24H27V21Z" />
          </svg>
          <span class="brand-wordmark" aria-hidden="true">
            <span class="brand-wordmark-paper">paper-</span><span class="brand-wordmark-linter">linter.</span>
          </span>
        </a>
        <div class="header-actions">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">Light mode</button>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <aside class="control-panel">
        <form id="lint-form">
          <fieldset class="panel-section input-section">
            <input id="archive-input" class="visually-hidden" type="file" accept=".zip,.tar,.gz,.tgz,.tar.gz,application/zip,application/gzip" />
            <input id="directory-input" class="visually-hidden" type="file" webkitdirectory multiple />
            <div id="drop-zone" class="drop-zone">
              <div class="drop-center">
                <strong>Upload source</strong>
                <span id="drop-name">Drop here</span>
              </div>
              <div class="source-actions" aria-label="Choose source">
                <button id="choose-archive" class="source-choice" type="button">
                  <strong>Archive</strong>
                </button>
                <button id="choose-directory" class="source-choice" type="button">
                  <strong>Folder</strong>
                </button>
              </div>
            </div>

          </fieldset>

          <span id="status" class="status visually-hidden" aria-live="polite"></span>

          <fieldset class="panel-section">
            <legend class="rules-legend">
              <span>Rules</span>
              <span id="rules-count" class="rules-count"></span>
            </legend>
            <div class="rule-scope-panel">
              <div class="rule-scope-head">
                <span>Quick selection</span>
                <div class="profile-actions">
                  <button id="profile-clear" class="profile-action" type="button">Clear all</button>
                  <button id="profile-reset" class="profile-action" type="button" hidden>Reset</button>
                </div>
              </div>
              <div id="rule-domains" class="rule-domains" aria-label="Rule domains"></div>
            </div>
            <div class="rule-toolbar">
              <label>Search
                <input id="rule-filter" type="text" placeholder="Code, group, or rule name" />
              </label>
            </div>
            <div id="rule-groups" class="inspection-tree"></div>
            <input type="hidden" name="select" id="select-value" />
          </fieldset>
        </form>
      </aside>

      <section class="report">
        <div id="report-tabs" class="report-tabs" aria-label="Report views"></div>
        <div class="report-head">
          <div class="report-heading">
            <div class="report-title-row">
              <div class="report-title">Report</div>
              <button id="copy-report" class="icon-button" type="button" aria-label="Copy report as Markdown" title="Copy report as Markdown" disabled>
                <span class="icon-button-icon icon-copy" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </span>
                <span class="icon-button-icon icon-check" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path class="check-path" d="M5 13l4 4L19 7"></path>
                  </svg>
                </span>
              </button>
            </div>
            <div id="source" class="subtitle"></div>
          </div>
          <div class="metrics">
            <span class="metric" id="files">files 0</span>
            <span class="metric error" id="errors">errors 0</span>
            <span class="metric warning" id="warnings">warnings 0</span>
          </div>
        </div>
        <div id="report" class="markdown-report empty">Upload a local archive or directory to run the linter.</div>
      </section>
    </main>
  </body>
</html>
